spec_version: 1
name: mediguard-ai
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: >
  Context-aware ICU patient monitoring RL environment.
  Agents learn to suppress false alarms, detect deterioration,
  and triage multiple patients using personal vital sign baselines.

tasks:
  - name: suppression
    difficulty: easy
    description: >
      Single hypertensive patient. Agent must learn that high BP
      is normal for this patient and suppress false alarms while
      catching genuine emergencies.

  - name: deterioration
    difficulty: medium
    description: >
      Single sepsis patient with slow vitals decline over 6 simulated
      hours. Agent must detect the trend early before crisis.

  - name: triage
    difficulty: hard
    description: >
      Four concurrent patients with varying urgency. Agent must rank
      by urgency and differentiate — scored by NDCG@4 + F1 + responsiveness.

action_space:
  type: discrete
  n: 3
  labels:
    - "0: Ignore — vitals normal for this patient"
    - "1: Verify — mild deviation, alert nurse"
    - "2: Alert  — genuine emergency, call doctor"

observation_space:
  type: dict
  fields:
    heart_rate:       {type: float, range: [0.0, 1.0], description: Normalized heart rate}
    systolic_bp:      {type: float, range: [0.0, 1.0], description: Normalized systolic BP}
    diastolic_bp:     {type: float, range: [0.0, 1.0], description: Normalized diastolic BP}
    spo2:             {type: float, range: [0.0, 1.0], description: Normalized SpO2}
    respiratory_rate: {type: float, range: [0.0, 1.0], description: Normalized respiratory rate}
    temperature:      {type: float, range: [0.0, 1.0], description: Normalized temperature}
    baseline_delta:   {type: float, range: [0.0, 1.0], description: Rolling deviation from personal baseline}
    hours_observed:   {type: float, range: [0.0, inf], description: Hours elapsed}
    activity:         {type: int,   range: [0, 4],     description: "0=resting 1=eating 2=walking 3=distressed 4=falling"}
    vitals_history:   {type: list,  shape: [10, 6],    description: Last 10 timesteps of normalized vitals}

episode_length: 60
reward_range: [0.0, 1.0]
seed: 42
